  <!-- Syntax highlighting: both theme sheets load; the active one is chosen to
       match the resolved data-theme (below + main.js) — which may be a manual
       override — not prefers-color-scheme directly. Only emitted when the page
       actually contains a code block (<pre>); most pages have none, so they skip
       ~14.7 KB of render-blocking CSS. The inline script below and main.js both
       guard getElementById, so their absence is safe. -->
  <!-- Resolve theme + starting hue before first paint: no flash of the wrong
       theme or the default hue. Mirrors the logic in main.js.
       theme mode is one of light / dark / system (default); "system" follows the
       OS live (see main.js). data-theme is the resolved light|dark that drives
       colours; data-theme-mode is the chosen mode that drives the toggle icon. -->
  <script>
    (function () {
      try {
        var d = document.documentElement;
        var mode = localStorage.getItem("theme") || "system";
        var prefersDark = matchMedia("(prefers-color-scheme: dark)").matches;
        var theme = mode === "system" ? (prefersDark ? "dark" : "light") : mode;
        d.setAttribute("data-theme", theme);
        d.setAttribute("data-theme-mode", mode);
        var dark = document.getElementById("giallo-dark");
        var light = document.getElementById("giallo-light");
        if (dark && light) {
          dark.media = theme === "light" ? "not all" : "all";
          light.media = theme === "light" ? "all" : "not all";
        }
        if (!matchMedia("(prefers-reduced-motion: reduce)").matches) {
          d.style.setProperty("--hue", (Date.now() / 1800000 * 360 % 360).toFixed(1));
        }
      } catch (e) {}
    })();
  </script>
