on: push
jobs:
  build:
    runs-on: ubuntu-latest
    if: github.ref != 'refs/heads/main'
    steps:
      - name: 'checkout'
        uses: actions/checkout@v3.0.0
      - name: 'setup node'
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: 'guard: no math (site has no renderer)'
        run: node scripts/check-no-math.mjs
      - name: 'build'
        uses: shalzz/zola-deploy-action@v0.22.1
        env:
          PAGES_BRANCH: gh-pages
          BUILD_DIR: .
          BUILD_THEMES: false
          BUILD_ONLY: true
  build_and_deploy:
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - name: 'checkout'
        uses: actions/checkout@v3.0.0
      - name: 'setup node'
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: 'guard: no math (site has no renderer)'
        run: node scripts/check-no-math.mjs
      - name: 'build and deploy'
        uses: shalzz/zola-deploy-action@v0.22.1
        env:
          PAGES_BRANCH: gh-pages
          BUILD_DIR: .
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          BUILD_THEMES: false
