title = "Henrik Åkesson"

# The URL the site will be built for
base_url = "https://akesson.io"

# Whether to automatically compile all Sass files in the sass directory
compile_sass = true

# Whether to build a search index to be used later on by a JavaScript library
build_search_index = false

# The taxonomies to be rendered for that site and their configuration
# Example:
#     taxonomies = [
#       {name = "tags", rss = true}, # each tag will have its own RSS feed
#       {name = "categories", paginate_by = 5},  # 5 items per page for a term
#       {name = "authors"}, # Basic definition: no RSS or pagination
#     ]
#
taxonomies = [{ name = "tags", rss = true }]

[markdown.highlighting]
# Syntax highlighting — Zola 0.22+ ("giallo"). style="class" emits CSS classes
# (.z-*) instead of inline styles and generates one stylesheet per theme, so the
# code block can follow the site's dark/light toggle. dark_theme/light_theme pick
# the pair; they are swapped client-side by the theme toggle (see main.js), not
# by prefers-color-scheme, since the toggle is manual. Theme list:
# https://github.com/getzola/giallo
style = "class"
dark_theme = "nord"
light_theme = "github-light"

[extra]
# Put all your custom variables here
home_subtitle = "Independent software developer — Rust & open source"

footer_copyright = ' &#183; <a href="https://creativecommons.org/licenses/by-nc/4.0/" target="_blank" rel="noopener">CC BY-NC 4.0</a>'

# Top tab strip — three real-URL sections rendered as tabs. `path` is matched
# against Zola's `current_path` to mark the active tab (aria-current). Articles
# is the home, served at "/". Order is Articles · Projects · About.
tabs = [
    { path = "/", name = "Articles" },
    { path = "/projects/", name = "Projects" },
    { path = "/about/", name = "About" },
]

hermit_social = [
    { name = "GitHub", link = "https://github.com/akesson" },
    { name = "twitter", link = "https://x.com/hakesso" },
]

[extra.author]
name = "Henrik Åkesson"
